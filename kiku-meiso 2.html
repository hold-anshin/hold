<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 聴く瞑想</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&family=Shippori+Mincho:wght@400&family=Noto+Serif+JP:wght@400&display=swap');

  :root {
    --pink-bg: #fde8f0;
    --pink-light: #f8bbd9;
    --pink-mid: #f48fb1;
    --pink-text: #c2607a;
    --pink-dark: #8d3a52;
    --pink-hold: #b03060;
    --white-soft: #fff5f8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    min-height: 100%;
  }

  body {
    background: var(--pink-bg);
    font-family: 'Shippori Mincho', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* 背景グロー */
  .bg-glow {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, #f9c8dc55 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, #f8bbd940 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    transition: opacity 2s ease;
  }
  body.playing .bg-glow { opacity: 1; }

  .frame-wrap {
    width: calc(100% - 28px);
    max-width: 420px;
    margin: 14px auto;
    border-radius: 34px;
    padding: 3px;
    background: linear-gradient(
      160deg,
      #fff8fb 0%,
      #fff2f7 28%,
      #ffffff 55%,
      #fff2f7 78%,
      #fff0f5 100%
    );
    box-shadow: 0 4px 16px rgba(244, 143, 177, 0.08);
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 10;
    width: 100%;
    padding: 16px 12px 40px;
    gap: 0;
    border-radius: 32px;
    background: var(--pink-bg);
  }

  /* ── タイトル ── */
  .title-area {
    text-align: center;
    opacity: 0;
    animation: fadeInDown 1.2s ease forwards 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .leaf { font-size: 64px; line-height: 1; margin-bottom: 2px; }

  .hold-label {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 0.6em;
    color: var(--pink-hold);
  }

  .title {
    font-family: 'Shippori Mincho', serif;
    font-size: 38px;
    font-weight: 400;
    color: var(--pink-dark);
    letter-spacing: 0.3em;
    line-height: 1.3;
  }

  .subtitle {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 18px;
    color: var(--pink-dark);
    letter-spacing: 0.25em;
    font-weight: 400;
    opacity: 0.8;
    margin-top: 10px;
  }

  /* ── ハートエリア ── */
  .heart-area {
    position: relative;
    width: 160px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fadeIn 1s ease forwards 0.7s;
    margin-bottom: 14px;
    flex-shrink: 0;
  }

  .ripple {
    position: absolute;
    border-radius: 50%;
    border: 2px solid var(--pink-mid);
    opacity: 0;
    width: 100%;
    height: 100%;
  }
  body.playing .ripple:nth-child(1) { animation: rippleOut 2.6s ease-out infinite 0s; }
  body.playing .ripple:nth-child(2) { animation: rippleOut 2.6s ease-out infinite 0.65s; }
  body.playing .ripple:nth-child(3) { animation: rippleOut 2.6s ease-out infinite 1.3s; }
  body.playing .ripple:nth-child(4) { animation: rippleOut 2.6s ease-out infinite 1.95s; }

  @keyframes rippleOut {
    0%   { transform: scale(1);   opacity: 0.5; border-color: var(--pink-mid); }
    100% { transform: scale(1.6); opacity: 0;   border-color: var(--pink-light); }
  }

  .play-btn {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--white-soft);
    border: 2.5px solid var(--pink-mid);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.4s ease;
    box-shadow:
      0 8px 40px rgba(244, 143, 177, 0.3),
      0 0 0 8px #fde8f0,
      0 0 0 10px #f9d0e288;
    z-index: 10;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  .play-btn:hover {
    background: #fff0f6;
    box-shadow: 0 10px 50px rgba(244, 143, 177, 0.45),
      0 0 0 8px #fde8f0, 0 0 0 10px #f9d0e288;
    transform: scale(1.02);
  }
  .play-btn:active { transform: scale(0.98); }

  body.playing .play-btn {
    background: linear-gradient(145deg, #fce4ec, #f9c8db);
    border-color: var(--pink-text);
    animation: heartbeat 2.6s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    10%     { transform: scale(1.07); }
    20%     { transform: scale(1); }
    30%     { transform: scale(1.04); }
    40%     { transform: scale(1); }
  }

  .btn-heart {
    font-size: 60px;
    line-height: 0.9;
    color: var(--pink-dark);
    transition: color 0.3s;
  }
  body.playing .btn-heart { color: var(--pink-text); }

  .btn-countdown {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--pink-dark);
    line-height: 1;
    opacity: 0;
    transition: opacity 0.4s;
    position: absolute;
    bottom: 16px;
  }
  body.playing .btn-countdown { opacity: 1; }

  /* ── 音量 ── */
  .volume-area { display: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 1.2s;
    margin-bottom: 16px;
  }

  .volume-label {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--pink-text);
    opacity: 0.7;
  }

  .volume-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 200px;
    height: 2px;
    background: linear-gradient(to right, var(--pink-mid) 0%, var(--pink-mid) 70%, #f8bbd9 70%);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--white-soft);
    border: 2px solid var(--pink-mid);
    box-shadow: 0 2px 8px rgba(244,143,177,0.4);
    cursor: pointer;
    transition: all 0.2s;
  }
  .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

  /* ── メインメッセージ ── */
  .main-message {
    font-family: 'Noto Serif JP', serif;
    font-size: 21px;
    font-weight: 400;
    color: var(--pink-dark);
    letter-spacing: 0.2em;
    text-align: center;
    opacity: 0;
    animation: fadeIn 1.2s ease forwards 1.4s;
    margin-bottom: 16px;
  }

  /* ── サブメッセージ ── */
  .sub-message {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 17px;
    font-weight: 400;
    color: #9e2e55;
    letter-spacing: 0.12em;
    text-align: center;
    line-height: 2.5;
    opacity: 0;
    animation: fadeIn 1.2s ease forwards 1.8s;
    border-top: 1px solid #f0b0c8;
    padding-top: 24px;
    width: 100%;
    max-width: 320px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="frame-wrap"><div class="container">

  <div class="title-area">
    <span class="leaf">🌿</span>
    <div class="hold-label">HOLD</div>
    <div class="title">聴く瞑想</div>
    <div class="subtitle">ただ音に耳をすませるだけ</div>
  </div>

  <div class="heart-area">
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="ripple"></div>
    <button class="play-btn" id="playBtn" onclick="togglePlay()">
      <span class="btn-heart" id="btnHeart">♡</span>
      <span class="btn-countdown" id="btnCountdown">60</span>
    </button>
  </div>

  <div class="main-message">今あなたはここにいる</div>

  <div class="sub-message">
    無にならなくていい<br>
    ただ目を閉じて<br>
    今ここにある音に耳をすませるだけ
  </div>

</div></div>

<script>
  let audioCtx = null, gainNode = null;
  let isPlaying = false;
  let countdownInterval = null, countdownSec = 60;

  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 0.7;
      gainNode.connect(audioCtx.destination);
    }
    return audioCtx;
  }

  function createHeartbeat() {
    const ctx = getAudioCtx();
    const interval = 60 / 62;

    function playBeat(time) {
      if (!isPlaying) return;

      [[55,42,0.55,0.18],[38,38,0.3,0.22]].forEach(([f1,f2,g,dur], i) => {
        const osc = ctx.createOscillator(), env = ctx.createGain();
        osc.connect(env); env.connect(gainNode);
        osc.frequency.setValueAtTime(f1, time);
        if (f1 !== f2) osc.frequency.exponentialRampToValueAtTime(f2, time + 0.08);
        osc.type = 'sine';
        env.gain.setValueAtTime(0, time);
        env.gain.linearRampToValueAtTime(g, time + (i===0 ? 0.01 : 0.02));
        env.gain.exponentialRampToValueAtTime(0.001, time + dur);
        osc.start(time); osc.stop(time + dur);
      });

      const t2 = time + 0.19;
      [[70,50,0.32,0.14],[48,48,0.18,0.13]].forEach(([f1,f2,g,dur]) => {
        const osc = ctx.createOscillator(), env = ctx.createGain();
        osc.connect(env); env.connect(gainNode);
        osc.frequency.setValueAtTime(f1, t2);
        if (f1 !== f2) osc.frequency.exponentialRampToValueAtTime(f2, t2 + 0.07);
        osc.type = 'sine';
        env.gain.setValueAtTime(0, t2);
        env.gain.linearRampToValueAtTime(g, t2 + 0.01);
        env.gain.exponentialRampToValueAtTime(0.001, t2 + dur);
        osc.start(t2); osc.stop(t2 + dur);
      });

      const delay = (time + interval - ctx.currentTime) * 1000 - 50;
      setTimeout(() => { if (isPlaying) playBeat(ctx.currentTime + 0.05); }, Math.max(delay, 0));
    }
    playBeat(ctx.currentTime + 0.1);
  }

  function startCountdown() {
    countdownSec = 60;
    document.getElementById('btnCountdown').textContent = 60;
    countdownInterval = setInterval(() => {
      countdownSec--;
      document.getElementById('btnCountdown').textContent = countdownSec;
      if (countdownSec <= 0) stopMeditation();
    }, 1000);
  }

  function stopCountdown() {
    clearInterval(countdownInterval);
    document.getElementById('btnCountdown').textContent = '60';
  }

  function togglePlay() { isPlaying ? stopMeditation() : startMeditation(); }

  function startMeditation() {
    isPlaying = true;
    document.body.classList.add('playing');
    document.getElementById('btnHeart').textContent = '♥';
    createHeartbeat();
    startCountdown();
  }

  function stopMeditation() {
    isPlaying = false;
    document.body.classList.remove('playing');
    document.getElementById('btnHeart').textContent = '♡';
    stopCountdown();
  }

  function setVolume(val) {
    if (gainNode) gainNode.gain.value = parseFloat(val);
    const pct = val * 100;
    document.getElementById('volumeSlider').style.background =
      `linear-gradient(to right, #f48fb1 0%, #f48fb1 ${pct}%, #f8bbd9 ${pct}%)`;
  }
</script>
</body>
</html>
